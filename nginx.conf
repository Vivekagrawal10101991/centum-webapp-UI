# 1. Redirection Block: Catches 'www' and redirects to non-www (HTTPS)
server {
    listen 80;
    server_name www.centumacademy.com;
    
    # 301 Permanent Redirect to the exact same path on the non-www domain
    return 301 https://centumacademy.com$request_uri;
}

# 2. Main Application Block: Serves your React/Vite Frontend
server {
    listen 80;
    server_name centumacademy.com localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Handles React Router's client-side dynamic routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}