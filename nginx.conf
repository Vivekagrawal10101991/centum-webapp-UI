# 1. Redirection Block: Catches 'www' and redirects to non-www (HTTPS)
server {
    listen 80;
    server_name www.centumacademy.com;
    
    # 301 Permanent Redirect to the exact same path on the non-www domain
    return 301 https://centumacademy.com$request_uri;
}

# 2. Main Application Block: Serves your React/Vite Frontend
server {
    listen 80;
    server_name centumacademy.com localhost;

    root /usr/share/nginx/html;
    index index.html;

    # --- 301 SEO REDIRECTS FOR OLD URLs ---
    # The "permanent" flag tells Nginx to return a 301 HTTP status code
    rewrite ^/iit-jee-coaching-bangalore/?$ https://centumacademy.com/program/iit-jee-coaching-bangalore permanent;
    rewrite ^/neet-coaching-bangalore/?$ https://centumacademy.com/program/neet-coaching-bangalore permanent;
    rewrite ^/foundation-program-bangalore/?$ https://centumacademy.com/program/foundation-coaching-bangalore permanent;
    rewrite ^/iit-foundation-coaching-bangalore/?$ https://centumacademy.com/program/iit-foundation-coaching-bangalore permanent;
    rewrite ^/neet-foundation-coaching-bangalore/?$ https://centumacademy.com/program/neet-foundation-coaching-bangalore permanent;

    # Handles React Router's client-side dynamic routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}